# Renderer configuration for DeoVR (Meta Quest). Without this, UMS doesn't
# recognize the device and falls back to its default MPEGPS-MPEG2-AC3
# transcoding profile for every file, producing very low video bitrate and
# garbled audio. DeoVR's UPnP/DLNA layer is built on MiniUPnPc, which is what
# it's matched on below (confirmed via debug.log: "Media renderer was not
# recognized from IP ... User-Agent: MSWindows/.../MiniUPnPc/...").
ConfName = DeoVR

UserAgentSearch = MiniUPnPc

LoadingPriority = 1

Supported = f:mp4 v:h264 a:aac m:video/mp4

# Fallback for anything not yet normalized to H.264/AAC
TranscodeVideo = MP4-H264-AAC
