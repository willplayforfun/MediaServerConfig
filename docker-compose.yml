services:
  # ── Helpsite Render ────────────────────────────────────────────────────────
  # One-shot. Walks ./helpsite, renders any *.tmpl files into ./helpsite-rendered
  # via envsubst, copies non-template files verbatim. nginx serves the output.
  helpsite-render:
    build:
      context: ./template_rendering
      dockerfile: Dockerfile
    image: homeserver-renderer:local
    pull_policy: never
    volumes:
      - ./helpsite:/in:ro
      - ./helpsite-rendered:/out
    environment:
      - IN=/in
      - OUT=/out
      # The literal string passed to envsubst as its allowlist. The $$ escapes
      # are needed so docker-compose doesn't try to expand these itself.
      - VARS=$${DOMAIN} $${PLEX_HTTPS_PORT}
      - DOMAIN=${DOMAIN}
      - PLEX_HTTPS_PORT=${PLEX_HTTPS_PORT}

  # ── Nginx Config Render ──────────────────────────────────────────────────────
  # One-shot. Renders ./nginx-configs/*.tmpl into ./nginx-configs-rendered via
  # envsubst (so the Plex HTTPS port is injected), then nginx mounts the output.
  # nginx runtime $variables ($host, $scheme, ...) are NOT in the allowlist, so
  # envsubst leaves them untouched.
  nginx-render:
    build:
      context: ./template_rendering
      dockerfile: Dockerfile
    image: homeserver-renderer:local
    pull_policy: never
    volumes:
      - ./nginx-configs:/in:ro
      - ./nginx-configs-rendered:/out
    environment:
      - IN=/in
      - OUT=/out
      - VARS=$${PLEX_HTTPS_PORT}
      - PLEX_HTTPS_PORT=${PLEX_HTTPS_PORT}

  # ── dnsmasq Render ─────────────────────────────────────────────────────────
  dnsmasq-render:
    build:
      context: ./template_rendering
      dockerfile: Dockerfile
    image: homeserver-renderer:local
    pull_policy: never
    volumes:
      - ./dnsmasq:/in:ro
      - ./dnsmasq-rendered:/out
    environment:
      - IN=/in
      - OUT=/out
      - VARS=$${DOMAIN} $${LOCAL_IP}
      - DOMAIN=${DOMAIN}
      - LOCAL_IP=${LOCAL_IP}

  # ── Cert Init ──────────────────────────────────────────────────────────────
  # One-shot service. Runs before nginx starts.
  # Fast exit if certificates already exist; otherwise issues them via
  # certbot standalone (binds port 80 directly while nginx is not yet running).
  # Set STAGING=1 in .env to test with the Let's Encrypt staging CA first.
  cert-init:
    image: certbot/certbot
    ports:
      - "80:80"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./scripts/cert-init.sh:/cert-init.sh:ro
    environment:
      - DOMAIN=${DOMAIN}
      - EMAIL=${CERTBOT_EMAIL}
      - STAGING=${STAGING:-}
    entrypoint: ["/bin/sh", "/cert-init.sh"]

  # ── Nginx ──────────────────────────────────────────────────────────────────
  # Unified reverse proxy, TLS termination, and help site.
  # Waits for cert-init and helpsite-render to finish before starting.
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    # Only depends on the file prerequisites: the TLS cert must exist before
    # nginx can bind :443/:${PLEX_HTTPS_PORT}, and the config must be rendered
    # first. nginx does NOT depend on any media service — upstreams are resolved
    # at request time (see resolver in the rendered configs), so a disabled or
    # down backend returns 502 instead of blocking nginx startup.
    depends_on:
      cert-init:
        condition: service_completed_successfully
      helpsite-render:
        condition: service_completed_successfully
      nginx-render:
        condition: service_completed_successfully
    ports:
      - "80:80"
      - "443:443"
      - "${PLEX_HTTPS_PORT}:${PLEX_HTTPS_PORT}"   # Plex HTTPS (proxied at root)
    volumes:
      - ./nginx-configs-rendered/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-configs-rendered/locations.conf:/etc/nginx/locations.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./helpsite-rendered:/usr/share/nginx/html:ro

  # ── Certbot Renewal ────────────────────────────────────────────────────────
  # Long-running loop that checks for renewal every 12 hours.
  # Uses webroot mode (nginx serves the ACME challenge path).
  # Reloads nginx after a successful renewal via docker exec.
  # Requires the Docker socket so it can reach the nginx container.
  certbot-renew:
    image: certbot/certbot
    restart: unless-stopped
    depends_on:
      - nginx
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./scripts/certbot-renew.sh:/certbot-renew.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "/certbot-renew.sh"]

  # ── Jellyfin ───────────────────────────────────────────────────────────────
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    profiles: ["jellyfin"]
    restart: unless-stopped
    ports:
      - "8096:8096"
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - /srv/mergerfs/media/movies:/media/movies:ro
      - /srv/mergerfs/media/tv:/media/tv:ro
    devices:
      - /dev/dri:/dev/dri    # Intel Quick Sync
    environment:
      - JELLYFIN_PublishedServerUrl=https://${DOMAIN}/jellyfin

  # ── Plex ───────────────────────────────────────────────────────────────────
  # Nginx terminates TLS on ${PLEX_HTTPS_PORT} and proxies Plex at the root
  # (Plex can't live under a subpath like /jellyfin).
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    profiles: ["plex"]
    restart: unless-stopped
    volumes:
      - ./plex/config:/config
      - ./plex/transcode:/transcode
      - /srv/mergerfs/media/movies:/media/movies:ro
      - /srv/mergerfs/media/tv:/media/tv:ro
    devices:
      - /dev/dri:/dev/dri    # Intel Quick Sync (shared with Jellyfin)
    environment:
      # One-time claim token from https://www.plex.tv/claim (set by env-setup)
      - PLEX_CLAIM=${PLEX_CLAIM:-}
      - ADVERTISE_IP=https://${DOMAIN}:${PLEX_HTTPS_PORT}/
      - TZ=${TZ:-Etc/UTC}

  # ── Audiobookshelf ─────────────────────────────────────────────────────────
  # Hardcoded /audiobookshelf base path. Works out of the box.
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    profiles: ["audiobookshelf"]
    restart: unless-stopped
    ports:
      - "13378:80"
    volumes:
      - ./audiobookshelf/config:/config
      - ./audiobookshelf/metadata:/metadata
      - /srv/mergerfs/media/audiobooks:/audiobooks
      - /srv/mergerfs/media/podcasts:/podcasts
  
  # ── Navidrome ─────────────────────────────────────────────────────────
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    profiles: ["navidrome"]
    restart: unless-stopped
    ports:
        - "4533:4533"
    volumes:
        - ./navidrome/data:/data
        - /srv/mergerfs/media/music:/music:ro
    environment:
        ND_SCANSCHEDULE: 1h
        ND_LOGLEVEL: info
        ND_BASEURL: /music
  
  # ── Stash ──────────────────────────────────────────────────────────────────
  stash:
    image: stashapp/stash:latest
    container_name: stash
    profiles: ["stash"]
    restart: unless-stopped
    ports:
      - "9999:9999"
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "2m"
    environment:
      - STASH_STASH=/data/
      - STASH_GENERATED=/generated/
      - STASH_METADATA=/metadata/
      - STASH_CACHE=/cache/
      - STASH_PORT=9999
    volumes:
      - /srv/mergerfs/media/extra/media:/data/media
      - /etc/localtime:/etc/localtime:ro
      - ./stash/config:/root/.stash
      - ./stash/metadata:/metadata
      - ./stash/cache:/cache
      - ./stash/blobs:/blobs
      - ./stash/generated:/generated

  # ── Filebrowser ────────────────────────────────────────────────────────────
  # Web-based file browser. Root directory is controlled by FILEBROWSER_ROOT
  # in .env — point it at whatever SMB share OMV exposes (e.g. /srv/mergerfs/media/share).
  # Database and user accounts are persisted in ./filebrowser/data/ at runtime.
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    profiles: ["filebrowser"]
    user: root
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/init.sh"]
    ports:
      - "8085:80"
    environment:
      - INITIAL_FILEBROWSER_PASSWORD=${INITIAL_FILEBROWSER_PASSWORD}
    volumes:
      - ${FILEBROWSER_ROOT:-/srv/mergerfs/media}:/srv
      - ./filebrowser/data:/database
      - ./filebrowser/settings.json:/config/settings.json:ro
      - ./filebrowser/init.sh:/init.sh:ro

  # ── FileFlows ──────────────────────────────────────────────────────────────
  # Media file processing workflows (transcode, rename, move, etc.).
  # Set AppBaseUrl so internal links work under the /fileflows subpath.
  # Hardware encoding via /dev/dri mirrors Jellyfin's Quick Sync setup.
  fileflows:
    image: revenz/fileflows:latest
    container_name: fileflows
    profiles: ["fileflows"]
    restart: unless-stopped
    ports:
      - "19200:5000"
    environment:
      - TZ=${TZ:-Etc/UTC}
      - PUID=1000
      - PGID=1000
      - AppBaseUrl=/fileflows
    volumes:
      - ./fileflows/data:/app/Data
      - /srv/mergerfs/media:/media
    devices:
      - /dev/dri:/dev/dri    # Hardware encoding (optional, mirrors Jellyfin)

  # ── Universal Media Server ───────────────────────────────────────────────
  # DLNA/UPnP server. DLNA discovery uses SSDP multicast, 
  # which does not cross Docker's bridge network, so this runs
  # with host networking.
  universalmediaserver:
    image: universalmediaserver/ums:latest
    container_name: universalmediaserver
    profiles: ["universalmediaserver"]
    restart: unless-stopped
    network_mode: host
    environment:
      # Tells UMS to read/write UMS.conf and its database under /profile.
      - UMS_PROFILE=/profile
    volumes:
      - ./universalmediaserver/config:/profile
      - /srv/mergerfs/media/vr:/media:ro

  # ── No-IP (Dynamic DNS Update Client) ─────────────────────────────────────
  noip-duc:
    image: noipcom/noip-duc:latest
    container_name: noip-duc
    profiles: ["noip"]
    restart: unless-stopped
    environment:
      - NOIP_USERNAME=${NOIP_USERNAME}
      - NOIP_PASSWORD=${NOIP_PASSWORD}
      - NOIP_HOSTNAMES=${NOIP_HOSTNAMES}
    network_mode: host   # needed so it can detect your real public IP

  # ── Cloudflare DDNS ────────────────────────────────────────────────────────
  cloudflare-ddns:
    image: favonia/cloudflare-ddns:latest
    container_name: cloudflare-ddns
    profiles: ["cloudflare"]
    restart: unless-stopped
    environment:
      - CF_API_TOKEN=${CF_API_TOKEN}
      - DOMAINS=${DOMAIN}
      - PROXIED=false
    network_mode: host   # needed so it can detect your real public IP

  # ── dnsmasq (local DNS) ────────────────────────────────────────────────────
  # The address mapping at ./dnsmasq/conf.d/local.conf is generated by
  # dnsmasq-render from ./dnsmasq/templates/local.conf.tmpl on each `up`.
  dnsmasq:
    image: dockurr/dnsmasq:latest
    container_name: dnsmasq
    restart: unless-stopped
    depends_on:
      dnsmasq-render:
        condition: service_completed_successfully
    network_mode: host   # binds port 53 directly on the host LAN interface
    cap_add:
      - NET_ADMIN
    environment:
      - DNS1=${DNS1}
      - DNS2=${DNS2}
    volumes:
      - ./dnsmasq-rendered:/etc/dnsmasq.d:ro
