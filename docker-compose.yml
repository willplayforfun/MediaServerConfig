services:
  # ── Cert Init ──────────────────────────────────────────────────────────────
  # One-shot service. Runs before nginx starts.
  # Fast exit if certificates already exist; otherwise issues them via
  # certbot standalone (binds port 80 directly while nginx is not yet running).
  # Set STAGING=1 in .env to test with the Let's Encrypt staging CA first.
  cert-init:
    image: certbot/certbot
    ports:
      - "80:80"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./scripts/cert-init.sh:/cert-init.sh:ro
    environment:
      - DOMAIN=${NOIP_NAME}.ddns.net
      - EMAIL=${CERTBOT_EMAIL}
      - STAGING=${STAGING:-}
    entrypoint: ["/bin/sh", "/cert-init.sh"]

  # ── Nginx ──────────────────────────────────────────────────────────────────
  # Unified reverse proxy, TLS termination, and help site.
  # Waits for cert-init to complete successfully before starting.
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    depends_on:
      cert-init:
        condition: service_completed_successfully
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-configs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./helpsite:/usr/share/nginx/html:ro

  # ── Certbot Renewal ────────────────────────────────────────────────────────
  # Long-running loop that checks for renewal every 12 hours.
  # Uses webroot mode (nginx serves the ACME challenge path).
  # Reloads nginx after a successful renewal via docker exec.
  # Requires the Docker socket so it can reach the nginx container.
  certbot-renew:
    image: certbot/certbot
    restart: unless-stopped
    depends_on:
      - nginx
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./scripts/certbot-renew.sh:/certbot-renew.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "/certbot-renew.sh"]

  # ── Jellyfin ───────────────────────────────────────────────────────────────
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - /srv/mergerfs/media/movies:/media/movies:ro
      - /srv/mergerfs/media/tv:/media/tv:ro
    devices:
      - /dev/dri:/dev/dri    # Intel Quick Sync
    environment:
      - JELLYFIN_PublishedServerUrl=https://${NOIP_NAME}.ddns.net/jellyfin

  # ── Audiobookshelf ─────────────────────────────────────────────────────────
  # Hardcoded /audiobookshelf base path. Works out of the box.
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    ports:
      - "13378:80"
    volumes:
      - ./audiobookshelf/config:/config
      - ./audiobookshelf/metadata:/metadata
      - /srv/mergerfs/media/audiobooks:/audiobooks
      - /srv/mergerfs/media/podcasts:/podcasts

  # ── Stash ──────────────────────────────────────────────────────────────────
  stash:
    image: stashapp/stash:latest
    container_name: stash
    restart: unless-stopped
    ports:
      - "9999:9999"
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "2m"
    environment:
      - STASH_STASH=/data/
      - STASH_GENERATED=/generated/
      - STASH_METADATA=/metadata/
      - STASH_CACHE=/cache/
      - STASH_PORT=9999
    volumes:
      - /srv/mergerfs/media/extra/media:/data/media
      - /etc/localtime:/etc/localtime:ro
      - ./stash/config:/root/.stash
      - /srv/mergerfs/pool/Stash:/data
      - ./stash/metadata:/metadata
      - ./stash/cache:/cache
      - ./stash/blobs:/blobs
      - ./stash/generated:/generated

  # ── No-IP (Dynamic DNS Update Client) ─────────────────────────────────────
  noip-duc:
    image: noipcom/noip-duc:latest
    container_name: noip-duc
    restart: unless-stopped
    environment:
      - NOIP_USERNAME=${NOIP_USERNAME}
      - NOIP_PASSWORD=${NOIP_PASSWORD}
      - NOIP_HOSTNAMES=${NOIP_HOSTNAMES}
    network_mode: host   # needed so it can detect your real public IP

  # ── dnsmasq (local DNS) ────────────────────────────────────────────────────
  # The address mapping lives in ./dnsmasq/conf.d/local.conf,
  dnsmasq:
    image: dockurr/dnsmasq:latest
    container_name: dnsmasq
    restart: unless-stopped
    network_mode: host   # binds port 53 directly on the host LAN interface
    cap_add:
      - NET_ADMIN
    environment:
      - DNS1=${DNS1}
      - DNS2=${DNS2}
    volumes:
      - ./dnsmasq/conf.d:/etc/dnsmasq.d:ro
