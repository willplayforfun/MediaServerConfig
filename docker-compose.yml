services:

  # ── Nginx Proxy Manager ──
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP (Let's Encrypt challenges)
      - "443:443"     # HTTPS
      - "81:81"       # Admin panel (local access only)
    volumes:
      - ./nginx-proxy-manager/data:/data
      - ./nginx-proxy-manager/letsencrypt:/etc/letsencrypt
      - ./nginx-configs/server_proxy.conf:/data/nginx/custom/server_proxy.conf

  # ── Jellyfin ──
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - /srv/mergerfs/media/movies:/media/movies:ro
      - /srv/mergerfs/media/tv:/media/tv:ro
    devices:
      - /dev/dri:/dev/dri    # Intel Quick Sync
    environment:
      - JELLYFIN_PublishedServerUrl=https://mlev.ddns.net/jellyfin

  # ── Audiobookshelf ──
  # Hardcoded /audiobookshelf base path. Works out of the box.
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: unless-stopped
    ports:
      - "13378:80"
    volumes:
      - ./audiobookshelf/config:/config
      - ./audiobookshelf/metadata:/metadata
      - /srv/mergerfs/media/audiobooks:/audiobooks
      - /srv/mergerfs/media/podcasts:/podcasts

  # ── Stash ──
  stash:
    image: stashapp/stash:latest
    container_name: stash
    restart: unless-stopped
    ports:
      - "9999:9999"
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "2m"
    environment:
      - STASH_STASH=/data/
      - STASH_GENERATED=/generated/
      - STASH_METADATA=/metadata/
      - STASH_CACHE=/cache/
      - STASH_PORT=9999
    volumes:
      - /srv/dev-disk-by-uuid-320822070821CB25/pmedia:/data/media1  # ← add this
      - /srv/dev-disk-by-uuid-BC96547B965437DA/p:/data/media2  # ← add this
      - /srv/dev-disk-by-uuid-BC96547B965437DA/OtherFiles:/data/media3  # ← add this
      - /etc/localtime:/etc/localtime:ro
      - ./stash/config:/root/.stash
      - /srv/mergerfs/pool/Stash:/data
      - ./stash/metadata:/metadata
      - ./stash/cache:/cache
      - ./stash/blobs:/blobs
      - ./stash/generated:/generated

  # ── Help Page (static web server) ──
  helpsite:
    image: nginx:alpine
    container_name: helpsite
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./helpsite:/usr/share/nginx/html:ro
      - ./nginx-configs/helpsite.conf:/etc/nginx/conf.d/default.conf:ro

  noip-duc:
    image: noipcom/noip-duc:latest
    container_name: noip-duc
    restart: unless-stopped
    environment:
      - NOIP_USERNAME=${NOIP_USERNAME}
      - NOIP_PASSWORD=${NOIP_PASSWORD}
      - NOIP_HOSTNAME=${NOIP_HOSTNAME}
    network_mode: host   # needed so it can detect your real public IP