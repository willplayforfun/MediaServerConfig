
# ── Help site ─────────────────────────────────────────────────────────────────
location = / {
    return 301 /help/;
}
location /help {
    return 301 /help/;
}
location /help/ {
    alias /usr/share/nginx/html/;
    index index.html;
}

# ── Jellyfin ──────────────────────────────────────────────────────────────────
location /jellyfin {
    return 301 $scheme://$host/jellyfin/;
}
location /jellyfin/ {
    proxy_pass http://jellyfin:8096;

    proxy_pass_header Authorization;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Protocol $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;

    # WebSocket support (required for Jellyfin)
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Disable buffering to prevent streaming issues
    proxy_buffering off;
}

# ── Audiobookshelf ────────────────────────────────────────────────────────────
location /audiobookshelf {
    proxy_pass http://audiobookshelf:80;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
}

# ── Navidrome ─────────────────────────────────────────────────────────────────
location /music {
    return 301 $scheme://$host/music/;
}
location /music/ {
    proxy_pass http://navidrome:4533;

    proxy_pass_header Authorization;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Protocol $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;

    proxy_buffering off;
}

# ── Filebrowser ───────────────────────────────────────────────────────────────
location /files {
    return 301 $scheme://$host/files/;
}
location /files/ {
    proxy_pass http://filebrowser:80;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
}

# ── Stash ─────────────────────────────────────────────────────────────────────
location /stash/ {
    proxy_pass http://stash:9999/;

    proxy_http_version 1.1;
    proxy_set_header Upgrade             $http_upgrade;
    proxy_set_header Connection          "Upgrade";
    proxy_set_header Host               $http_host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Port   $server_port;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-Prefix /stash;
    proxy_read_timeout 60000s;
}
